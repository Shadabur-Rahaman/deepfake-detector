# .github/workflows/ci-cd.yml

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Linting and Testing (Python-specific)
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create ml_artifacts directory and download haarcascade XML
        run: |
          mkdir -p ml_artifacts
          wget -q https://raw.githubusercontent.com/opencv/opencv/master/data/haarcascades/haarcascade_frontalface_default.xml -O ml_artifacts/haarcascade_frontalface_default.xml
          # Verify download
          ls -lh ml_artifacts/haarcascade_frontalface_default.xml

      - name: Create data directory and dummy sample video for tests
        run: |
          mkdir -p data
          # Create a very small, valid MP4 for testing.
          # This requires ffmpeg on the runner, which is usually pre-installed on ubuntu-latest.
          # If not, you might need an additional step to install ffmpeg.
          ffmpeg -f lavfi -i nullsrc=s=128x128:d=1 -f lavfi -i color=c=red:s=128x128:d=1 -filter_complex "[0][1]overlay=format=auto,format=yuv420p" -c:v libx264 -preset superfast -crf 30 -an data/sample_video.mp4 || echo "ffmpeg not found or failed, proceeding without live video test."
          # If ffmpeg isn't available or fails, this test might skip or fail if `data/sample_video.mp4` is critical.
          # For a more robust solution, commit a tiny sample_video.mp4 to your repo directly.

      - name: Run Linting (Flake8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run Code Formatter Check (Black)
        run: |
          pip install black
          black --check .

      - name: Run Unit Tests
        # API_BASE_URL is not set here, so test_api.py will use its default localhost
        # This job primarily focuses on isolated unit tests (like test_ml_logic.py)
        # and pre-checks before spinning up Docker services.
        run: pytest tests/test_ml_logic.py

  # Job 2: Build and Push Docker Image (after linting and unit tests pass)
  build_and_push_docker:
    runs-on: ubuntu-latest
    needs: lint_and_test # This job depends on lint_and_test passing
    environment: production # Use an environment for secrets management (optional but good practice)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (if DOCKER_USERNAME secret is present)
        # Only attempt login if secrets are provided, making this step optional.
        if: github.event_name == 'push' && github.repository_owner == 'Shadabur-Rahaman' && secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.repository_owner == 'Shadabur-Rahaman' && secrets.DOCKER_USERNAME != '' }} # Only push on push events and if secrets are available
          tags: shadabur-rahaman/deepfake-detector:latest,shadabur-rahaman/deepfake-detector:${{ github.sha }}
          cache-from: type=gha # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

  # Job 3: Integration Tests (runs against the Dockerized app)
  integration_tests:
    runs-on: ubuntu-latest
    needs: build_and_push_docker # This job depends on the Docker image being built
    environment: test # Use a test environment (optional)

    # Define the FastAPI app as a service
    services:
      app:
        image: shadabur-rahaman/deepfake-detector:latest # Use the image built in the previous step
        ports:
          - 8000:8000
        env:
          # Set the BASE_URL for the integration tests to point to the service
          API_BASE_URL: http://app:8000
        # Optional: Add a healthcheck to ensure the service is ready before tests run
        options: >-
          --health-cmd "curl --fail http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python Dependencies (for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio # Needed for async tests

      - name: Create data directory and dummy sample video for tests
        run: |
          mkdir -p data
          # Re-create the sample video for the test runner environment
          ffmpeg -f lavfi -i nullsrc=s=128x128:d=1 -f lavfi -i color=c=red:s=128x128:d=1 -filter_complex "[0][1]overlay=format=auto,format=yuv420p" -c:v libx264 -preset superfast -crf 30 -an data/sample_video.mp4 || echo "ffmpeg not found or failed, proceeding without live video test."


      - name: Wait for FastAPI service to be healthy
        # This step uses a simple bash loop to wait for the health check endpoint
        # The 'services.app.options' health check is better, but this provides a fallback.
        run: |
          echo "Waiting for app service to be ready..."
          ATTEMPTS=0
          MAX_ATTEMPTS=60 # Up to 60 * 1 second = 1 minute wait
          while ! curl -s http://app:8000/health > /dev/null; do
            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "App service did not become healthy in time."
              exit 1
            fi
            sleep 1
            ATTEMPTS=$((ATTEMPTS+1))
          done
          echo "App service is healthy."

      - name: Run API Integration Tests
        env:
          API_BASE_URL: http://app:8000 # This sets the env var for test_api.py
        run: pytest tests/test_api.py